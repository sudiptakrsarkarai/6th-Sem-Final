<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LoadGo Admin Panel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Login Screen -->
  <div id="loginScreen" class="login-screen">
    <div class="login-card">
      <div class="login-logo">
        <i class="fas fa-truck-fast"></i>
      </div>
      <h1>LoadGo Admin</h1>
      <p class="login-subtitle">Logistics Management Panel</p>
      <form id="loginForm">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="loginEmail" placeholder="admin@loadgo.in" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="loginPassword" placeholder="Enter password" required>
        </div>
        <button type="submit" class="btn-primary" id="loginBtn">
          <span>Login</span>
          <i class="fas fa-arrow-right"></i>
        </button>
        <p id="loginError" class="error-text"></p>
      </form>
    </div>
  </div>

  <!-- Main Dashboard -->
  <div id="dashboard" class="dashboard hidden">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">
          <i class="fas fa-truck-fast"></i>
        </div>
        <h2>LoadGo</h2>
        <p>Admin Panel</p>
      </div>
      <nav class="sidebar-nav">
        <a href="#" class="nav-item active" data-page="overview">
          <i class="fas fa-chart-pie"></i>
          <span>Dashboard</span>
        </a>
        <a href="#" class="nav-item" data-page="orders">
          <i class="fas fa-boxes-stacked"></i>
          <span>Orders</span>
        </a>
        <a href="#" class="nav-item" data-page="drivers">
          <i class="fas fa-id-card"></i>
          <span>Drivers</span>
        </a>
        <a href="#" class="nav-item" data-page="users">
          <i class="fas fa-users"></i>
          <span>Customers</span>
        </a>
        <a href="#" class="nav-item" data-page="pricing">
          <i class="fas fa-calculator"></i>
          <span>Pricing Math</span>
        </a>
        <a href="#" class="nav-item" data-page="settings">
          <i class="fas fa-cog"></i>
          <span>Settings</span>
        </a>
      </nav>
      <div class="sidebar-footer">
        <button class="btn-logout" id="logoutBtn">
          <i class="fas fa-sign-out-alt"></i>
          <span>Logout</span>
        </button>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <!-- Top Bar -->
      <div class="topbar">
        <div class="topbar-left">
          <button class="menu-toggle" id="menuToggle">
            <i class="fas fa-bars"></i>
          </button>
          <h1 id="pageTitle">Dashboard</h1>
        </div>
        <div class="topbar-right">
          <div class="admin-info">
            <span id="adminName">Admin</span>
            <div class="admin-avatar">
              <i class="fas fa-user-shield"></i>
            </div>
          </div>
        </div>
      </div>

      <!-- Content Area -->
      <div class="content-area" id="contentArea">
        <!-- Pages loaded dynamically -->
      </div>
    </main>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
